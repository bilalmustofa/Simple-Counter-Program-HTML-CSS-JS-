<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
    <title>Simple-Counter-Program-HTML-CSS-JS</title>
</head>
<body>
    <header>
        <h1>Simple-Counter-Program (HTML-CSS-JS)</h1>
        <span><a href="https://github.com/bilalmustofa" target="_blank"><i class="fa-brands fa-github"></i></a></span>
    </header>
    <div class="dark-mode-box">
        <label for="darkModeCheckbox">Dark Mode:</label>
        <input type="checkbox" id="darkModeCheckbox">
    </div>
    <div class="wrapper">
        <h2 id="counter">0</h2>
        <div>
            <button id="increaseBtn"  class="btns">+</button>
            <button id="decreaseBtn"  class="btns">-</button>
        </div>
        <div>
            <label for="changeBy">Increment/Decrement BY:</label>
            <input type="number" id="changeBy" value="1" >
        </div>
        <button id="resetBtn" class="btns">Reset</button>
    </div>

    <script src="./script.js"></script>
</body>
</html>
